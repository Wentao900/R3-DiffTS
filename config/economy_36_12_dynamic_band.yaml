#type: args

train:
  epochs: 150
  batch_size: 32
  lr: 0.0025
  itr_per_epoch: 1.0e+8
  multi_res_horizons: [1, 3, 6, 12]
  multi_res_band_boundaries: [1, 3, 6, 12]
  multi_res_loss_weight: 0.1
  multi_res_use_huber: true
  multi_res_huber_delta: 1.0
  multi_res_mode: dynamic_band
  multi_res_weight_mode: adaptive
  multi_res_weight_focus: hard
  multi_res_weight_beta: 0.95
  multi_res_weight_temp: 1.0
  multi_res_weight_strength: 0.3
  multi_res_weight_alpha: 0.7
  multi_res_weight_floor: 0.15
  multi_res_weight_warmup_steps: 400

diffusion:
  layers: 6
  channels: 64
  nheads: 8
  diffusion_embedding_dim: 128
  beta_start: 0.0001
  beta_end: 0.6
  num_steps: 300
  schedule: "quad"
  is_linear: False
  noise_esti: False
  cfg: True
  c_mask_prob: 0.05
  ddim: True
  sample_steps: 20
  sample_method: "quad"
  pre_norm: False

model:
  cot_model: ./gpt2-medium
  cot_temperature: 0.4
  cot_max_new_tokens: 64
  dynamic_text_len: true
  dynamic_text_lens: [6, 18, 36]
  is_unconditional: 0
  timeemb: 128
  featureemb: 16
  guide_w_default: 4.5
  target_strategy: "test"
  num_sample_features: 64
  rag_stage1_topk: 9
  rag_stage2_topk: 3
  rag_topk: 3
  timestep_branch: False
  timestep_emb_cat: True
  with_texts: True
  relative_size_emb_cat: False
  decomp: False
  llm: "bert"
  llm_layers: 0
  scale_aware_rag: true
  use_rag_cot: true
  use_two_stage_rag: true
