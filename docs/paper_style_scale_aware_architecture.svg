<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1080" viewBox="0 0 1800 1080" role="img" aria-labelledby="title desc">
  <title id="title">Scale-aware Multimodal Diffusive Forecasting Architecture</title>
  <desc id="desc">Literature-style overview figure for the scale-aware multimodal forecasting pipeline, including scale profiling, text construction path, control path, conditional diffusion training, and adaptive guidance inference.</desc>
  <defs>
    <style>
      .bg { fill: #fbfaf7; }
      .title { font: 700 30px "Helvetica Neue", Arial, sans-serif; fill: #13212b; }
      .subtitle { font: 400 15px "Helvetica Neue", Arial, sans-serif; fill: #51606c; }
      .section { font: 700 16px "Helvetica Neue", Arial, sans-serif; fill: #18252d; letter-spacing: 0.8px; }
      .boxTitle { font: 700 16px "Helvetica Neue", Arial, sans-serif; fill: #152029; }
      .boxText { font: 400 13px "Helvetica Neue", Arial, sans-serif; fill: #33424c; }
      .small { font: 400 12px "Helvetica Neue", Arial, sans-serif; fill: #5d6c77; }
      .panelInput { fill: #f7f4ed; stroke: #c8bea9; stroke-width: 2; rx: 26; ry: 26; }
      .panelShared { fill: #f4f8fb; stroke: #9bb7ca; stroke-width: 2; rx: 26; ry: 26; }
      .panelText { fill: #f7fbf7; stroke: #9fbea4; stroke-width: 2; rx: 26; ry: 26; }
      .panelCtrl { fill: #fbf8fd; stroke: #b6a7d0; stroke-width: 2; rx: 26; ry: 26; }
      .panelBackbone { fill: #fff9f2; stroke: #cfb18a; stroke-width: 2; rx: 26; ry: 26; }
      .boxInput { fill: #fffdf8; stroke: #a8956e; stroke-width: 1.8; rx: 18; ry: 18; }
      .boxShared { fill: #e7f1f8; stroke: #5e88a3; stroke-width: 1.8; rx: 18; ry: 18; }
      .boxText1 { fill: #e6f2e8; stroke: #54815f; stroke-width: 1.8; rx: 18; ry: 18; }
      .boxText2 { fill: #eef7ef; stroke: #6b8b6c; stroke-width: 1.8; rx: 18; ry: 18; }
      .boxCtrl1 { fill: #eee7f8; stroke: #72589e; stroke-width: 1.8; rx: 18; ry: 18; }
      .boxCtrl2 { fill: #f5effc; stroke: #8b75b2; stroke-width: 1.8; rx: 18; ry: 18; }
      .boxBackbone { fill: #fff4e5; stroke: #9d7148; stroke-width: 1.8; rx: 18; ry: 18; }
      .note { fill: #fffef9; stroke: #b8a77d; stroke-width: 1.6; rx: 16; ry: 16; }
      .arrow { stroke: #314552; stroke-width: 2.6; fill: none; marker-end: url(#arrow); }
      .soft { stroke: #6d747a; stroke-width: 2; fill: none; stroke-dasharray: 7 6; marker-end: url(#arrowSoft); }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#314552"/>
    </marker>
    <marker id="arrowSoft" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#6d747a"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1800" height="1080"/>

  <text class="title" x="900" y="52" text-anchor="middle">Scale-aware Multimodal Diffusive Forecasting</text>
  <text class="subtitle" x="900" y="78" text-anchor="middle">A literature-style overview extending MCD-TSF with scale-aware text construction and router-based training / inference control</text>

  <!-- Input panel -->
  <rect class="panelInput" x="70" y="120" width="380" height="860"/>
  <text class="section" x="100" y="155">INPUTS</text>

  <rect class="boxInput" x="100" y="185" width="320" height="120"/>
  <text class="boxTitle" x="260" y="218" text-anchor="middle">Historical Series</text>
  <text class="boxText" x="260" y="245" text-anchor="middle">Lookback window  X_i = [x_1, ..., x_H]</text>
  <text class="boxText" x="260" y="267" text-anchor="middle">raw values for trend / volatility / acceleration</text>

  <rect class="boxInput" x="100" y="340" width="320" height="108"/>
  <text class="boxTitle" x="260" y="373" text-anchor="middle">Temporal Signals</text>
  <text class="boxText" x="260" y="400" text-anchor="middle">timestamps U_i for historical and future points</text>
  <text class="boxText" x="260" y="422" text-anchor="middle">calendar and structural time cues</text>

  <rect class="boxInput" x="100" y="483" width="320" height="128"/>
  <text class="boxTitle" x="260" y="516" text-anchor="middle">Textual Sources</text>
  <text class="boxText" x="260" y="543" text-anchor="middle">raw reports / search corpus / external evidence</text>
  <text class="boxText" x="260" y="565" text-anchor="middle">used for retrieval-augmented text conditioning</text>
  <text class="boxText" x="260" y="587" text-anchor="middle">and trend reasoning</text>

  <rect class="note" x="100" y="660" width="320" height="170"/>
  <text class="boxTitle" x="260" y="694" text-anchor="middle">Design Principle</text>
  <text class="boxText" x="260" y="723" text-anchor="middle">Not all samples require the same</text>
  <text class="boxText" x="260" y="745" text-anchor="middle">text window, horizon emphasis, or</text>
  <text class="boxText" x="260" y="767" text-anchor="middle">guidance strength.</text>
  <text class="boxText" x="260" y="804" text-anchor="middle">Therefore, the method builds a shared</text>
  <text class="boxText" x="260" y="826" text-anchor="middle">scale representation and uses it to</text>
  <text class="boxText" x="260" y="848" text-anchor="middle">drive both text construction and control.</text>

  <!-- Shared scale profiling -->
  <rect class="panelShared" x="500" y="120" width="1240" height="170"/>
  <text class="section" x="530" y="155">SHARED SCALE PROFILING</text>

  <rect class="boxShared" x="540" y="185" width="340" height="78"/>
  <text class="boxTitle" x="710" y="216" text-anchor="middle">Scale Feature Extraction</text>
  <text class="boxText" x="710" y="240" text-anchor="middle">slope, absolute slope, volatility, diff std, accel</text>

  <rect class="boxShared" x="930" y="176" width="380" height="96"/>
  <text class="boxTitle" x="1120" y="207" text-anchor="middle">Scale Representation</text>
  <text class="boxText" x="1120" y="232" text-anchor="middle">z_i = Phi(X_i)</text>
  <text class="boxText" x="1120" y="254" text-anchor="middle">shared latent summary of short / mid / long preference</text>

  <rect class="boxShared" x="1360" y="176" width="340" height="96"/>
  <text class="boxTitle" x="1530" y="207" text-anchor="middle">Split into Two Functional Paths</text>
  <text class="boxText" x="1530" y="232" text-anchor="middle">text construction path</text>
  <text class="boxText" x="1530" y="254" text-anchor="middle">and control path</text>

  <path class="arrow" d="M880 224 L930 224"/>
  <path class="arrow" d="M1310 224 L1360 224"/>

  <!-- Text path -->
  <rect class="panelText" x="500" y="330" width="760" height="430"/>
  <text class="section" x="530" y="365">TEXT CONSTRUCTION PATH</text>

  <rect class="boxText1" x="540" y="394" width="310" height="108"/>
  <text class="boxTitle" x="695" y="427" text-anchor="middle">Dynamic Text Window</text>
  <text class="boxText" x="695" y="454" text-anchor="middle">s_i^rag = G_rag(z_i),   l_i = Gamma(s_i^rag)</text>
  <text class="boxText" x="695" y="476" text-anchor="middle">select short / mid / long text span</text>

  <rect class="boxText1" x="910" y="394" width="310" height="108"/>
  <text class="boxTitle" x="1065" y="427" text-anchor="middle">Scale-aware Two-stage RAG</text>
  <text class="boxText" x="1065" y="454" text-anchor="middle">stage-1 retrieval  E0</text>
  <text class="boxText" x="1065" y="476" text-anchor="middle">trend hypothesis -> stage-2 refined evidence  E1</text>

  <rect class="boxText2" x="540" y="548" width="310" height="122"/>
  <text class="boxTitle" x="695" y="581" text-anchor="middle">CoT Summary and Trend Prior</text>
  <text class="boxText" x="695" y="608" text-anchor="middle">c_i = Psi_cot(X_i, U_i, D_i^rag)</text>
  <text class="boxText" x="695" y="630" text-anchor="middle">pi_i = Omega(c_i)</text>
  <text class="boxText" x="695" y="652" text-anchor="middle">direction / strength / volatility</text>

  <rect class="boxText2" x="910" y="548" width="310" height="122"/>
  <text class="boxTitle" x="1065" y="581" text-anchor="middle">Unified Text Condition</text>
  <text class="boxText" x="1065" y="608" text-anchor="middle">E_i^upd = Compose(T_i^raw, S_i^num,</text>
  <text class="boxText" x="1065" y="630" text-anchor="middle">s_i^rag, D_i^rag, c_i)</text>
  <text class="boxText" x="1065" y="652" text-anchor="middle">final context for text encoder / diffusion</text>

  <path class="arrow" d="M850 448 L910 448"/>
  <path class="arrow" d="M695 502 L695 548"/>
  <path class="arrow" d="M1065 502 L1065 548"/>
  <path class="soft" d="M850 612 L910 612"/>

  <!-- Control path -->
  <rect class="panelCtrl" x="500" y="790" width="760" height="190"/>
  <text class="section" x="530" y="825">CONTROL PATH</text>

  <rect class="boxCtrl1" x="540" y="850" width="250" height="95"/>
  <text class="boxTitle" x="665" y="880" text-anchor="middle">Scale Router Inputs</text>
  <text class="boxText" x="665" y="906" text-anchor="middle">numeric stats + trend prior pi_i</text>
  <text class="boxText" x="665" y="928" text-anchor="middle">+ text availability mask</text>

  <rect class="boxCtrl1" x="830" y="850" width="210" height="95"/>
  <text class="boxTitle" x="935" y="880" text-anchor="middle">Router Weights</text>
  <text class="boxText" x="935" y="906" text-anchor="middle">r_i^router = softmax</text>
  <text class="boxText" x="935" y="928" text-anchor="middle">over horizon bands</text>

  <rect class="boxCtrl2" x="1080" y="850" width="150" height="95"/>
  <text class="boxTitle" x="1155" y="880" text-anchor="middle">Two Uses</text>
  <text class="boxText" x="1155" y="906" text-anchor="middle">L_aux</text>
  <text class="boxText" x="1155" y="928" text-anchor="middle">and g_i</text>

  <path class="arrow" d="M790 897 L830 897"/>
  <path class="arrow" d="M1040 897 L1080 897"/>

  <!-- Backbone -->
  <rect class="panelBackbone" x="1310" y="330" width="430" height="650"/>
  <text class="section" x="1340" y="365">CONDITIONAL DIFFUSION BACKBONE</text>

  <rect class="boxBackbone" x="1350" y="395" width="350" height="120"/>
  <text class="boxTitle" x="1525" y="428" text-anchor="middle">Conditioned Denoising</text>
  <text class="boxText" x="1525" y="455" text-anchor="middle">f_theta(Y_i,k, X_i, U_i, E_i^upd)</text>
  <text class="boxText" x="1525" y="477" text-anchor="middle">history + temporal cues + text condition</text>
  <text class="boxText" x="1525" y="499" text-anchor="middle">jointly guide future sequence generation</text>

  <rect class="boxBackbone" x="1350" y="560" width="350" height="150"/>
  <text class="boxTitle" x="1525" y="593" text-anchor="middle">Training Objective</text>
  <text class="boxText" x="1525" y="620" text-anchor="middle">L = L_main + lambda_mr L_aux</text>
  <text class="boxText" x="1525" y="642" text-anchor="middle">band-wise losses over short / mid / long horizons</text>
  <text class="boxText" x="1525" y="664" text-anchor="middle">CFG masking enables conditional / unconditional branches</text>
  <text class="boxText" x="1525" y="686" text-anchor="middle">router weights reallocate horizon emphasis per sample</text>

  <rect class="boxBackbone" x="1350" y="755" width="350" height="150"/>
  <text class="boxTitle" x="1525" y="788" text-anchor="middle">Inference with Adaptive Guidance</text>
  <text class="boxText" x="1525" y="815" text-anchor="middle">Y_hat = f_theta(. , empty) + g_i [f_theta(. , E_i^upd) - f_theta(. , empty)]</text>
  <text class="boxText" x="1525" y="837" text-anchor="middle">g_i is produced from router scale score</text>
  <text class="boxText" x="1525" y="859" text-anchor="middle">not fixed for every sample</text>
  <text class="boxText" x="1525" y="881" text-anchor="middle">forecast = text-aware and scale-adaptive</text>

  <!-- Outputs -->
  <rect class="note" x="1400" y="930" width="250" height="32"/>
  <text class="boxText" x="1525" y="952" text-anchor="middle">Output: final forecast, horizon metrics, router diagnostics</text>

  <!-- Cross-panel arrows -->
  <path class="arrow" d="M450 245 L540 245 C560 245 560 240 560 240"/>
  <path class="soft" d="M1120 272 L1120 330"/>
  <path class="soft" d="M1120 272 C1120 300 665 300 665 850"/>

  <path class="arrow" d="M1220 610 L1280 610 C1300 610 1300 455 1350 455"/>
  <path class="arrow" d="M1230 897 L1290 897 C1320 897 1320 640 1350 640"/>
  <path class="arrow" d="M1230 897 L1290 897 C1320 897 1320 830 1350 830"/>
  <path class="soft" d="M850 610 C930 610 930 897 540 897"/>

  <!-- Footer note -->
  <text class="small" x="900" y="1032" text-anchor="middle">Key message: the method extends MCD-TSF by introducing a shared scale representation that simultaneously organizes text evidence and reallocates horizon-wise training / guidance.</text>
  <text class="small" x="900" y="1054" text-anchor="middle">This figure is suited for papers, slides, or method sections that need a clean overview rather than a code-level pipeline chart.</text>
</svg>
